app = "kursuz-web"
primary_region = "arn"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  DJANGO_DEBUG = "0"
  DJANGO_ALLOWED_HOSTS = "kursuz-web.fly.dev"
  MINIAPP_URL = "https://kursuz-web.fly.dev/miniapp/"
  MINIAPP_DEFAULT_LANGUAGE = "ru"
  SQLITE_PATH = "/data/db.sqlite3"
  WEB_CONCURRENCY = "2"
  GUNICORN_TIMEOUT = "120"

[processes]
  app = "/app/docker/start-web.sh"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
